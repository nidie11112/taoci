<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="保研导师信息搜集网站 - 智能匹配与文书生成平台" />
    <meta name="keywords" content="保研,导师,匹配,文书生成,学术,研究生" />
    <meta name="author" content="吴凌钧 & 林静" />

    <title>保研导师信息搜集网站</title>

    <!-- 预加载关键资源 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- 主题颜色 -->
    <meta name="theme-color" content="#1890ff">

    <!-- PWA支持 -->
    <link rel="manifest" href="/manifest.json">

    <!-- 苹果Touch图标 -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>

    <!-- 环境变量占位符 -->
    <script>
      window.env = {
        VITE_API_BASE_URL: '${VITE_API_BASE_URL}',
        VITE_APP_NAME: '${VITE_APP_NAME}',
        VITE_DEBUG: '${VITE_DEBUG}',
      };
    </script>

    <!-- 加载动画 -->
    <style>
      #root {
        min-height: 100vh;
      }

      /* 初始加载动画 */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        z-index: 9999;
        animation: fadeIn 0.3s ease-in;
      }

      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 1s ease-in-out infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .loading-text {
        margin-top: 20px;
        font-size: 1.2rem;
        font-weight: 500;
      }
    </style>

    <!-- 初始加载屏幕 -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-text">正在加载应用...</div>
    </div>

    <script>
      // 应用加载完成后隐藏加载屏幕
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.style.opacity = '0';
            loadingScreen.style.transition = 'opacity 0.3s ease';
            setTimeout(() => {
              loadingScreen.style.display = 'none';
            }, 300);
          }
        }, 500);
      });
    </script>
  </body>
</html>
